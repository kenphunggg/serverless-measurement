apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hello
  namespace: serverless
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/window: 6s
    spec:
      containers:
        - image: image
          ports:
            - containerPort: 5000
          env:
            - name: USER_NAME
              value: 'LAZYken'
            # - name: NODE_NAME
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: spec.nodeName
      nodeSelector:
        kubernetes.io/hostname: edge-node
      